<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Etiquetas PWA añadidas -->
    <meta name="theme-color" content="#386A20">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c2/Material_Design_Calculator_icon.svg/512px-Material_Design_Calculator_icon.svg.png">

    <title>Calculadora Material</title>
    <!-- Fuente Inter y Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        :root {
            /* Tema Claro - Material You Expressive (Tonos verdes/neutros) */
            --md-sys-color-background: #FBFDF8;
            --md-sys-color-surface: #F8FAF5;
            --md-sys-color-on-surface: #191C19;
            --md-sys-color-surface-variant: #E0E4DB;
            --md-sys-color-on-surface-variant: #434842;
            --md-sys-color-primary: #386A20;
            --md-sys-color-primary-container: #B7F397;
            --md-sys-color-on-primary-container: #042100;
            --md-sys-color-secondary-container: #D7E8CD;
            --md-sys-color-on-secondary-container: #111F0F;
            --md-sys-color-tertiary-container: #BCEBEB;
            --md-sys-color-on-tertiary-container: #002020;
            --md-sys-color-error: #BA1A1A;
            --md-sys-color-on-error: #FFFFFF;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                /* Tema Oscuro - Material You Expressive */
                --md-sys-color-background: #191C19;
                --md-sys-color-surface: #111411;
                --md-sys-color-on-surface: #E1E3DF;
                --md-sys-color-surface-variant: #434842;
                --md-sys-color-on-surface-variant: #C4C8BE;
                --md-sys-color-primary: #9CD67D;
                --md-sys-color-primary-container: #1F5107;
                --md-sys-color-on-primary-container: #B7F397;
                --md-sys-color-secondary-container: #334B2D;
                --md-sys-color-on-secondary-container: #D7E8CD;
                --md-sys-color-tertiary-container: #1E4E4E;
                --md-sys-color-on-tertiary-container: #BCEBEB;
                --md-sys-color-error: #FFB4AB;
                --md-sys-color-on-error: #690005;
            }
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000; /* Fondo del navegador para la PWA flotante */
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        /* Contenedor Principal PWA - Tamaño compacto */
        .calculator-app {
            width: 100%;
            max-width: 320px; /* Ancho restringido para PWA chiquita */
            height: auto; /* Permite que la app crezca si lo necesita */
            max-height: calc(100vh - 20px); /* Evita que se salga de la pantalla del monitor */
            background-color: var(--md-sys-color-surface);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* La Pantallita separada */
        .display-area {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface-variant);
            margin: 16px 16px 8px 16px;
            padding: 16px;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            min-height: 80px; /* Un poco más pequeña por defecto para dar espacio */
            flex-grow: 1; /* Permite que la pantalla absorba espacio extra */
            flex-shrink: 1;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.1);
        }

        .history {
            font-size: 0.9rem;
            opacity: 0.8;
            min-height: 1.2em;
            margin-bottom: 4px;
        }

        .current-input {
            font-size: 2.2rem;
            font-weight: 500;
            color: var(--md-sys-color-on-surface);
            word-wrap: break-word;
            word-break: break-all;
            line-height: 1.1;
            max-width: 100%;
            text-align: right;
        }

        .current-input.error {
            color: var(--md-sys-color-error);
        }

        /* Panel Científico (Oculto por defecto) */
        .scientific-panel {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            padding: 0 16px;
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            flex-shrink: 0; /* IMPIDE que el panel se apachurre por falta de espacio */
            transition: max-height 0.4s cubic-bezier(0.2, 0, 0, 1), opacity 0.3s, padding 0.3s;
        }

        .calculator-app.scientific-mode .scientific-panel {
            max-height: 250px; /* Incrementado para asegurar que no se corten botones */
            opacity: 1;
            padding: 8px 16px 8px 16px;
        }

        /* Botones ClassWiz */
        .btn-classwiz {
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-surface);
            border: 1px solid var(--md-sys-color-surface-variant);
            border-radius: 6px; /* Más cuadrados, estilo físico */
            font-size: 0.9rem;
            height: 34px;
            font-family: inherit;
            cursor: pointer;
            transition: filter 0.15s, border-radius 0.15s;
        }

        .btn-classwiz:active {
            filter: brightness(1.3);
            border-radius: 12px;
        }
        
        .btn-classwiz.shift { color: #D97706; font-weight: 600; border-color: rgba(217, 119, 6, 0.3); }
        .btn-classwiz.alpha { color: #E11D48; font-weight: 600; border-color: rgba(225, 29, 72, 0.3); }

        /* Teclado Principal */
        .keypad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            padding: 8px 16px 12px 16px;
            flex-grow: 0;
            flex-shrink: 0; /* IMPIDE que los botones circulares pierdan su aspecto perfecto */
        }

        /* Diseño de botones principales (Círculos que se hacen cuadrados) */
        .btn {
            border: none;
            outline: none;
            font-size: 1.4rem;
            font-family: inherit;
            cursor: pointer;
            aspect-ratio: 1; /* Mantenerlos perfectamente cuadrados/circulares */
            border-radius: 50%; /* CIRCULARES POR DEFECTO */
            display: flex;
            justify-content: center;
            align-items: center;
            /* La magia de la animación expresiva */
            transition: border-radius 0.3s cubic-bezier(0.2, 0, 0, 1), filter 0.1s;
        }

        .btn:active {
            border-radius: 16px; /* SE VUELVEN CUADRADOS AL PRESIONAR */
            filter: brightness(1.25); /* SE ACLARAN AL PRESIONAR */
        }

        .btn.number {
            background-color: var(--md-sys-color-surface-variant);
            color: var(--md-sys-color-on-surface-variant);
        }

        .btn.operator {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        .btn.clear {
            background-color: var(--md-sys-color-tertiary-container);
            color: var(--md-sys-color-on-tertiary-container);
            font-weight: 500;
            font-size: 1.1rem;
        }

        .btn.equals {
            background-color: var(--md-sys-color-primary-container);
            color: var(--md-sys-color-on-primary-container);
        }

        .btn.zero {
            grid-column: span 2;
            aspect-ratio: auto;
            border-radius: 40px; /* Píldora para el cero */
        }

        .btn.zero:active {
            border-radius: 16px; /* Cuadrado redondeado al presionar */
        }

        /* Barra de Navegación Inferior (Material 3) */
        .bottom-nav {
            display: flex;
            justify-content: center;
            background-color: var(--md-sys-color-surface);
            padding: 8px 8px 12px 8px;
            border-top: 1px solid rgba(128, 128, 128, 0.1);
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: transparent;
            border: none;
            color: var(--md-sys-color-on-surface-variant);
            cursor: pointer;
            padding: 4px;
        }

        .nav-item .icon-container {
            width: 64px;
            height: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 16px;
            margin-bottom: 4px;
            transition: background-color 0.2s, color 0.2s;
        }

        .nav-item span.label {
            font-size: 0.75rem;
            font-weight: 500;
        }

        .nav-item.active {
            color: var(--md-sys-color-on-surface);
        }

        .nav-item.active .icon-container {
            background-color: var(--md-sys-color-secondary-container);
            color: var(--md-sys-color-on-secondary-container);
        }

        /* Toast de notificaciones */
        .toast {
            position: absolute;
            bottom: 85px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background-color: var(--md-sys-color-on-surface);
            color: var(--md-sys-color-surface);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.8rem;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="calculator-app" id="app">
        
        <!-- PANTALLITA -->
        <div class="display-area">
            <div class="history" id="history"></div>
            <div class="current-input" id="display">0</div>
        </div>

        <!-- PANEL CIENTÍFICO (Estilo ClassWiz) -->
        <div class="scientific-panel" id="sciPanel">
            <button class="btn-classwiz shift" onclick="showToast('SHIFT')">SHIFT</button>
            <button class="btn-classwiz alpha" onclick="showToast('ALPHA')">ALPHA</button>
            <button class="btn-classwiz" onclick="appendInput('(')">(</button>
            <button class="btn-classwiz" onclick="appendInput(')')">)</button>

            <button class="btn-classwiz" onclick="appendInput('sin(')">sin</button>
            <button class="btn-classwiz" onclick="appendInput('cos(')">cos</button>
            <button class="btn-classwiz" onclick="appendInput('tan(')">tan</button>
            <button class="btn-classwiz" onclick="appendInput('^')">xⁿ</button>

            <button class="btn-classwiz" onclick="appendInput('ln(')">ln</button>
            <button class="btn-classwiz" onclick="appendInput('log(')">log</button>
            <button class="btn-classwiz" onclick="appendInput('√(')">√</button>
            <button class="btn-classwiz" onclick="appendInput('π')">π</button>
        </div>

        <!-- TECLADO PRINCIPAL -->
        <div class="keypad">
            <!-- Fila 1 -->
            <button class="btn clear" onclick="clearAll()">AC</button>
            <button class="btn operator" onclick="deleteLast()">
                <span class="material-symbols-rounded">backspace</span>
            </button>
            <button class="btn operator" onclick="appendInput('%')">%</button>
            <button class="btn operator" onclick="appendInput('÷')">÷</button>

            <!-- Fila 2 -->
            <button class="btn number" onclick="appendInput('7')">7</button>
            <button class="btn number" onclick="appendInput('8')">8</button>
            <button class="btn number" onclick="appendInput('9')">9</button>
            <button class="btn operator" onclick="appendInput('×')">×</button>

            <!-- Fila 3 -->
            <button class="btn number" onclick="appendInput('4')">4</button>
            <button class="btn number" onclick="appendInput('5')">5</button>
            <button class="btn number" onclick="appendInput('6')">6</button>
            <button class="btn operator" onclick="appendInput('−')">−</button>

            <!-- Fila 4 -->
            <button class="btn number" onclick="appendInput('1')">1</button>
            <button class="btn number" onclick="appendInput('2')">2</button>
            <button class="btn number" onclick="appendInput('3')">3</button>
            <button class="btn operator" onclick="appendInput('+')">+</button>

            <!-- Fila 5 -->
            <button class="btn number zero" onclick="appendInput('0')">0</button>
            <button class="btn number" onclick="appendInput('.')">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

        <!-- BARRA DE NAVEGACIÓN -->
        <div class="bottom-nav">
            <button class="nav-item active" id="navBasic" onclick="setMode('basic')">
                <div class="icon-container">
                    <span class="material-symbols-rounded">calculate</span>
                </div>
                <span class="label">Básica</span>
            </button>
            <button class="nav-item" id="navSci" onclick="setMode('scientific')">
                <div class="icon-container">
                    <span class="material-symbols-rounded">functions</span>
                </div>
                <span class="label">Científica</span>
            </button>
        </div>

        <div class="toast" id="toast">Mensaje</div>
    </div>

    <script>
        // Registrar el Service Worker para que funcione Offline
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('PWA Lista y Offline'))
                    .catch(err => console.log('Error PWA: ', err));
            });
        }

        let currentExp = '';
        let lastResult = '';
        let needsReset = false;

        const displayEl = document.getElementById('display');
        const historyEl = document.getElementById('history');
        const appEl = document.getElementById('app');

        // Cambiar entre Básico y Científico
        function setMode(mode) {
            if (mode === 'scientific') {
                appEl.classList.add('scientific-mode');
                document.getElementById('navSci').classList.add('active');
                document.getElementById('navBasic').classList.remove('active');
            } else {
                appEl.classList.remove('scientific-mode');
                document.getElementById('navBasic').classList.add('active');
                document.getElementById('navSci').classList.remove('active');
            }
        }

        // Actualizar pantalla
        function updateDisplay() {
            displayEl.innerText = currentExp === '' ? '0' : currentExp;
            displayEl.classList.remove('error');
        }

        // Mostrar Error
        function showError() {
            displayEl.innerText = 'Error';
            displayEl.classList.add('error');
            currentExp = '';
            needsReset = true;
        }

        // Ingresar valores
        function appendInput(val) {
            if (needsReset) {
                if (['+', '−', '×', '÷', '%', '^'].includes(val)) {
                    // Si el usuario presiona operador tras resultado, usa el resultado anterior
                    currentExp = lastResult;
                } else {
                    currentExp = '';
                }
                needsReset = false;
            }

            if (currentExp === '0' && val !== '.') currentExp = '';
            currentExp += val;
            updateDisplay();
        }

        // Borrar todo
        function clearAll() {
            currentExp = '';
            historyEl.innerText = '';
            needsReset = false;
            updateDisplay();
        }

        // Borrar último caracter (con soporte para borrar funciones enteras)
        function deleteLast() {
            if (needsReset) { clearAll(); return; }
            
            const funcs = ['sin(', 'cos(', 'tan(', 'log(', 'ln(', '√('];
            let deleted = false;
            
            for (let f of funcs) {
                if (currentExp.endsWith(f)) {
                    currentExp = currentExp.slice(0, -f.length);
                    deleted = true; break;
                }
            }

            if (!deleted) currentExp = currentExp.slice(0, -1);
            updateDisplay();
        }

        // Evaluar la expresión matemática
        function calculate() {
            if (!currentExp) return;

            // Guardar en historial
            historyEl.innerText = currentExp + ' =';

            try {
                // Traducción de símbolos visuales a JS Math
                let exprToEval = currentExp
                    .replace(/×/g, '*')
                    .replace(/÷/g, '/')
                    .replace(/−/g, '-')
                    .replace(/π/g, 'Math.PI')
                    .replace(/sin\(/g, 'Math.sin(')
                    .replace(/cos\(/g, 'Math.cos(')
                    .replace(/tan\(/g, 'Math.tan(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/√\(/g, 'Math.sqrt(')
                    .replace(/\^/g, '**')
                    .replace(/%/g, '/100');

                // Autocompletar paréntesis de cierre
                const openP = (exprToEval.match(/\(/g) || []).length;
                const closeP = (exprToEval.match(/\)/g) || []).length;
                for (let i = 0; i < openP - closeP; i++) {
                    exprToEval += ')';
                }

                // Evaluar (usando new Function en lugar de eval por ser un entorno simple)
                let result = new Function('return ' + exprToEval)();

                if (!isFinite(result) || isNaN(result)) throw new Error("Math Error");

                // Redondear para evitar bugs de flotantes (ej. 0.1+0.2)
                result = Math.round(result * 10000000000) / 10000000000;

                currentExp = result.toString();
                lastResult = currentExp;
                needsReset = true;
                updateDisplay();

            } catch (e) {
                showError();
            }
        }

        // Notificaciones visuales (Toast)
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg + " activado";
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
        }
    </script>
</body>
</html>
